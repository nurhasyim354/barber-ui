name: Build and Deploy

on:
  push:
    branches:
      - main

env:
  BRANCH_NAME: ${{ github.head_ref || github.ref_name }}
  EC2_HOSTNAME: ${{ vars.EC2_HOSTNAME }}
  EC2_USER: ${{ vars.EC2_USER }}
  SERVICE_NAME: barber-ui
  DOCKER_IMAGE_TAG: ${{ github.head_ref || github.ref_name }}
  DOCKER_IMAGE_TAGS: ${{ github.head_ref || github.ref_name }}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Set variables
        run: |
          echo "DOCKER_IMAGE_TAGS=docker.io/${{ secrets.DOCKER_USERNAME }}/${{env.SERVICE_NAME}}:${{ env.DOCKER_IMAGE_TAG }}" >> "$GITHUB_ENV"

      - name: setup ssh-agent
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 400 ~/.ssh/id_rsa
          eval "$(ssh-agent -s)"
          ssh-add ~/.ssh/id_rsa
      - uses: actions/checkout@v3
        with:
          ref: ${{env.BRANCH_NAME}}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log In to Container Registry
        run: echo ${{ secrets.DOCKER_PASSWORD }} | docker login docker.io --username ${{ secrets.DOCKER_USERNAME }} --password-stdin

      - name: Build API Image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ env.DOCKER_IMAGE_TAGS }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Log In to Container Registry on server ${{ env.EC2_HOSTNAME }}
        run: ssh -o "StrictHostKeyChecking no" -i ~/.ssh/id_rsa ${{ env.EC2_USER }}@${{ env.EC2_HOSTNAME }} 'echo ${{ secrets.DOCKER_PASSWORD }} |  docker login docker.io --username ${{ secrets.DOCKER_USERNAME }} --password-stdin'

      - name: Run on server ${{ env.EC2_HOSTNAME }}
        run: |
          ssh -o "StrictHostKeyChecking no" -i ~/.ssh/id_rsa ${{ env.EC2_USER }}@${{ env.EC2_HOSTNAME }} '(cd app && docker compose pull ${{env.SERVICE_NAME}} && docker compose up -d ${{env.SERVICE_NAME}}) && ( docker image prune -a -f || true)'  
          
      - name: Cleanup
        run: rm ~/.ssh/id_rsa